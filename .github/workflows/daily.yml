name: v14 daily paper-trade + dashboard

on:
  schedule:
    - cron: '15 0 * * *'      # 00:15 UTC daily (offset from top of hour per GitHub guidance)
  workflow_dispatch:           # lets you run it manually from the Actions tab
    inputs:
      force:
        description: 'Force a run even if already updated today'
        type: boolean
        default: false

permissions:
  contents: write              # allows committing state.json + web/data.json back

concurrency:
  group: daily-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run daily update + build dashboard data
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          WEB_DIR: "."
          ACCOUNT_SIZE: ${{ vars.ACCOUNT_SIZE }}
        run: |
          python runner.py ${{ inputs.force == true && '--force' || '' }}

      - name: Commit updated state + dashboard data
        run: |
          git config user.name  "v14-bot"
          git config user.email "actions@github.com"
          git add state.json data.json equity.png
          git diff --staged --quiet || git commit -m "daily update $(date -u +%F)"
          git push
